<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bloom.io — Grow. Bloom. Dominate.</title>
  <meta name="description" content="Bloom.io: control a living organism, expand your territory, risk it all with explosive BLOOMS. Free multiplayer .io game." />

  <!-- Open Graph / social sharing -->
  <meta property="og:title" content="Bloom.io — Organism Growth Battle" />
  <meta property="og:description" content="Grow your organism, collect nutrients, and BLOOM your way to the top of the global leaderboard." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/assets/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2334d399'/><circle cx='50' cy='50' r='20' fill='%23a7f3d0'/></svg>" />

  <!-- Google AdSense (H5 Games Ads / Ad Placement API). Replace client in config.js too. -->
  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
    crossorigin="anonymous"
    data-ad-frequency-hint="30s"></script>

  <!-- Phaser 3 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #06121a;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2f5ec;
      touch-action: none;
    }
    #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; }

    /* ---- Start screen ---- */
    #start-screen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0b2230 0%, #06121a 70%);
      gap: 16px;
    }
    #start-screen h1 {
      font-size: clamp(40px, 8vw, 72px); letter-spacing: 4px;
      background: linear-gradient(90deg, #34d399, #60a5fa);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    #start-screen p { color: #7ea8a0; max-width: 420px; text-align: center; padding: 0 16px; }
    #username-input {
      padding: 12px 18px; font-size: 18px; border-radius: 10px; border: 2px solid #1d4438;
      background: #0a1c26; color: #e2f5ec; outline: none; width: min(320px, 80vw); text-align: center;
    }
    #username-input:focus { border-color: #34d399; }
    #play-btn {
      padding: 14px 56px; font-size: 22px; font-weight: 700; border: none; border-radius: 12px;
      background: linear-gradient(90deg, #10b981, #34d399); color: #04110c; cursor: pointer;
      transition: transform .15s; letter-spacing: 2px;
    }
    #play-btn:hover { transform: scale(1.05); }
    #play-btn:disabled { opacity: .5; cursor: wait; }
    .controls-hint { font-size: 13px; color: #4d7a6e; }

    /* ---- HUD layers (DOM overlays managed by ui/*.js) ---- */
    .hud-layer { position: fixed; z-index: 40; pointer-events: none; }
    .hud-layer .clickable { pointer-events: auto; }

    /* ---- Mobile bloom button ---- */
    #bloom-btn {
      position: fixed; right: 22px; bottom: 90px; z-index: 45;
      width: 84px; height: 84px; border-radius: 50%; border: 3px solid #34d399;
      background: rgba(16,185,129,.25); color: #a7f3d0; font-size: 14px; font-weight: 700;
      display: none; align-items: center; justify-content: center; letter-spacing: 1px;
      backdrop-filter: blur(4px); cursor: pointer; user-select: none; -webkit-user-select: none;
    }
    #bloom-btn.cooldown { border-color: #475569; color: #64748b; background: rgba(71,85,105,.2); }
    @media (pointer: coarse) { #bloom-btn { display: flex; } }

    /* ---- Ad containers ---- */
    #ad-banner {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      z-index: 30; min-height: 0; max-width: 100vw; text-align: center;
    }
    #ad-overlay {
      position: fixed; inset: 0; z-index: 60; display: none;
      background: rgba(2,8,12,.92); align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    }

    /* ---- Death / respawn screen ---- */
    #death-screen {
      position: fixed; inset: 0; z-index: 55; display: none;
      background: rgba(10,0,0,.78); align-items: center; justify-content: center; flex-direction: column; gap: 14px;
      text-align: center; padding: 20px;
    }
    #death-screen h2 { color: #f87171; font-size: 42px; }
    #death-screen .stats { color: #94a3b8; line-height: 1.7; }
    .btn-secondary {
      padding: 12px 32px; font-size: 17px; border-radius: 10px; border: 2px solid #34d399;
      background: transparent; color: #34d399; cursor: pointer; font-weight: 600;
    }
    .btn-secondary:hover { background: rgba(52,211,153,.12); }

    /* ---- Toast / connection status ---- */
    #toast {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 70;
      background: #0f2c3a; border: 1px solid #1d4438; padding: 10px 22px; border-radius: 10px;
      display: none; font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Start screen -->
  <div id="start-screen">
    <h1>BLOOM.IO</h1>
    <p>Grow your organism. Collect nutrients. Press <b>SPACE</b> to BLOOM — explosive growth, total vulnerability.</p>
    <input id="username-input" maxlength="16" placeholder="Your organism's name" autocomplete="off" />
    <button id="play-btn">PLAY</button>
    <span class="controls-hint">Mouse / touch to move &nbsp;·&nbsp; SPACE / button to bloom</span>
  </div>

  <!-- Death screen -->
  <div id="death-screen">
    <h2>YOU WERE ABSORBED</h2>
    <div class="stats" id="death-stats"></div>
    <button class="btn-secondary" id="respawn-btn">RESPAWN</button>
    <button class="btn-secondary" id="rewarded-btn" style="border-color:#fbbf24;color:#fbbf24">▶ Watch ad: respawn with FULL biomass</button>
  </div>

  <!-- Ad overlay (interstitial placeholder while Ad Placement API runs) -->
  <div id="ad-overlay"><span>Advertisement…</span></div>

  <!-- Persistent banner -->
  <div id="ad-banner"></div>

  <!-- Mobile bloom button -->
  <div id="bloom-btn">BLOOM</div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Game mounts here -->
  <div id="game-container"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
